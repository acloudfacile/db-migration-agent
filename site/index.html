<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DB Migration Agent &#8212; AI-Powered Database Migration</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2332;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--cyan:#06b6d4;--purple:#a855f7;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--grad:linear-gradient(135deg,#06b6d4,#a855f7)}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
    body.dark-theme{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2332;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b}
    body.light-theme{--bg:#f5f5f5;--bg2:#ffffff;--bg3:#e8e8e8;--border:#e0e0e0;--text:#1a1a1a;--muted:#666;--dim:#999}
    code{font-family:'JetBrains Mono',monospace}
    a{color:var(--cyan);text-decoration:none}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideRight{from{width:0}to{width:100%}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .5s ease both}
    nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:56px}
    body.light-theme nav{background:rgba(245,245,245,.92)}
    .nav-brand{font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:8px;margin-right:32px;white-space:nowrap}
    .nav-spacer{flex:1}
    .nav-controls{display:flex;gap:12px;align-items:center}
    .theme-toggle{background:transparent;border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .theme-toggle:hover{border-color:var(--cyan);color:var(--cyan)}
    .nav-phase{display:flex;gap:4px}
    .nav-phase button{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 18px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:6px}
    .nav-phase button.active{background:var(--bg3);color:var(--cyan);border-color:var(--cyan)}
    .nav-phase button.locked{opacity:.45;cursor:not-allowed}
    .nav-phase button:not(.locked):hover{border-color:var(--cyan);color:var(--text)}
    .phase-badge{font-size:.65rem;padding:2px 7px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .badge-analysis{background:rgba(6,182,212,.15);color:var(--cyan)}
    .badge-migrate{background:rgba(168,85,247,.15);color:var(--purple)}
    .container{max-width:1200px;margin:0 auto;padding:32px 24px}
    .section-title{font-size:2rem;font-weight:900;margin-bottom:8px}
    .section-sub{color:var(--muted);margin-bottom:32px;font-size:1rem}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px}
    .btn{padding:10px 24px;border-radius:8px;border:none;font-weight:700;font-size:.88rem;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
    .btn-primary{background:var(--grad);color:#fff}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-outline:hover{border-color:var(--cyan)}
    .btn-success{background:var(--green);color:#fff}
    .btn-success:hover{opacity:.9}
    .btn-danger{background:var(--red);color:#fff}
    .btn-sm{padding:8px 16px;font-size:.8rem}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    label{font-size:.8rem;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
    select,input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:.88rem;font-family:inherit}
    select:focus,input:focus{outline:none;border-color:var(--cyan)}
    .progress-bar{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:8px 0}
    .progress-fill{height:100%;background:var(--grad);border-radius:3px;transition:width .4s ease}
    .stepper{display:flex;gap:0;margin-bottom:32px}
    .step{flex:1;text-align:center;position:relative;padding:16px 8px 0}
    .step-line{position:absolute;top:28px;left:50%;right:-50%;height:2px;background:var(--border);z-index:0}
    .step:last-child .step-line{display:none}
    .step-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;position:relative;z-index:1;transition:all .3s}
    .step-dot.done{background:var(--green);border-color:var(--green);color:#fff}
    .step-dot.active{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,.25)}
    .step-dot.locked{opacity:.4}
    .step-label{font-size:.7rem;color:var(--dim);margin-top:6px;font-weight:600}
    .step-label.active{color:var(--cyan)}
    .step-label.done{color:var(--green)}
    .log-box{background:#0d1117;border:1px solid var(--border);border-radius:10px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:.78rem;max-height:400px;overflow-y:auto;line-height:1.7}
    .log-line{animation:fadeIn .3s ease both}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600;margin-right:4px}
    .tag-ok{background:rgba(34,197,94,.12);color:var(--green)}
    .tag-warn{background:rgba(245,158,11,.12);color:var(--amber)}
    .tag-err{background:rgba(239,68,68,.12);color:var(--red)}
    .tag-info{background:rgba(6,182,212,.12);color:var(--cyan)}
    .report-section{margin-bottom:24px}
    .report-section h3{font-size:1.05rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .report-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .report-table th{text-align:left;padding:10px 12px;background:var(--bg3);color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
    .report-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
    .report-table tr:hover td{background:rgba(6,182,212,.03)}
    .score-ring{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900}
    .risk-low{background:conic-gradient(var(--green) var(--pct),var(--bg3) 0);color:var(--green)}
    .risk-med{background:conic-gradient(var(--amber) var(--pct),var(--bg3) 0);color:var(--amber)}
    .risk-high{background:conic-gradient(var(--red) var(--pct),var(--bg3) 0);color:var(--red)}
    .gap-item{padding:14px 16px;border-left:3px solid var(--amber);background:rgba(245,158,11,.04);border-radius:0 8px 8px 0;margin-bottom:10px}
    .gap-item.critical{border-left-color:var(--red);background:rgba(239,68,68,.04)}
    .gap-item.info{border-left-color:var(--cyan);background:rgba(6,182,212,.04)}
    .gap-title{font-weight:700;font-size:.88rem;margin-bottom:4px}
    .gap-desc{font-size:.8rem;color:var(--muted)}
    .gate-banner{background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(168,85,247,.08));border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:32px;text-align:center;margin:32px 0}
    .gate-banner h3{font-size:1.3rem;font-weight:800;margin-bottom:8px}
    .gate-banner p{color:var(--muted);margin-bottom:20px}
    .lock-msg{text-align:center;padding:80px 24px;color:var(--dim)}
    .lock-msg h3{font-size:1.4rem;margin-bottom:8px;color:var(--muted)}
    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
    .tab{padding:12px 24px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-weight:600;font-size:.88rem;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
    .tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
    .tab:hover{color:var(--text)}
    .tab-content{animation:slideDown .3s ease}
    .comparison{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .comparison-panel{border:1px solid var(--border);border-radius:8px;padding:16px;background:var(--bg3)}
    .comparison-panel h4{font-size:.85rem;font-weight:700;color:var(--cyan);margin-bottom:12px}
    .comparison-code{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:.75rem;overflow-x:auto;max-height:300px;overflow-y:auto}
    .timeline{position:relative;padding:24px 0}
    .timeline-item{display:flex;gap:24px;margin-bottom:32px;position:relative}
    .timeline-item:not(:last-child)::before{content:'';position:absolute;left:20px;top:60px;width:2px;height:calc(100% + 8px);background:var(--border)}
    .timeline-dot{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;font-size:1.2rem}
    .timeline-dot.success{background:rgba(34,197,94,.2);border-color:var(--green)}
    .timeline-dot.pending{background:rgba(245,158,11,.2);border-color:var(--amber);animation:pulse 2s infinite}
    .timeline-content{flex:1;padding-top:4px}
    .timeline-title{font-weight:700;color:var(--text);margin-bottom:4px;font-size:.9rem}
    .timeline-time{font-size:.75rem;color:var(--muted)}
    .metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
    .metric-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
    .metric-value{font-size:1.4rem;font-weight:800;color:var(--cyan)}
    .metric-label{font-size:.75rem;color:var(--muted);margin-top:4px}
    .metric-unit{font-size:.7rem;color:var(--dim)}
    .connection-test{display:flex;gap:12px;align-items:center;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
    .connection-test .status{width:10px;height:10px;border-radius:50%;animation:pulse .4s infinite}
    .connection-test.success .status{background:var(--green);animation:none}
    .connection-test.error .status{background:var(--red);animation:none}
    .connection-test.testing .status{background:var(--amber)}
    .rollback-section{background:var(--bg3);border-left:3px solid var(--cyan);border-radius:0 8px 8px 0;padding:16px;margin:12px 0}
    .export-button-group{display:flex;gap:8px;margin-bottom:16px}
    @media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.stepper{flex-wrap:wrap}.step-line{display:none}.comparison{grid-template-columns:1fr}.metrics-grid{grid-template-columns:repeat(2,1fr)}.tabs{flex-wrap:wrap}}
  </style>
</head>
<body class="dark-theme">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* == Data == */
const DB_ENGINES = [
  {id:'postgresql',name:'PostgreSQL',icon:'🐘',color:'#336791'},
  {id:'mysql',name:'MySQL',icon:'🐬',color:'#4479A1'},
  {id:'sqlserver',name:'SQL Server',icon:'💾',color:'#CC2927'},
  {id:'oracle',name:'Oracle',icon:'🔴',color:'#F80000'},
  {id:'sybase',name:'Sybase ASE',icon:'🟢',color:'#6DB33F'},
  {id:'mongodb',name:'MongoDB',icon:'🍃',color:'#13AA52'},
  {id:'cockroachdb',name:'CockroachDB',icon:'🦀',color:'#125C8C'},
  {id:'mariadb',name:'MariaDB',icon:'🔵',color:'#003545'}
];

const ANALYSIS_STEPS = [
  {id:'connect',label:'Connect',icon:'🔌'},
  {id:'schema',label:'Schema',icon:'📋'},
  {id:'data',label:'Data Profile',icon:'📊'},
  {id:'deps',label:'Dependencies',icon:'🔗'},
  {id:'procs',label:'Procedures',icon:'⚙'},
  {id:'perf',label:'Performance',icon:'⚡'},
  {id:'security',label:'Security',icon:'🔒'},
  {id:'gaps',label:'Admin Gaps',icon:'🔍'},
  {id:'risk',label:'Risk Score',icon:'🛡'},
  {id:'report',label:'Report',icon:'📝'}
];

const MIGRATION_STEPS = [
  {id:'config',label:'Configure',icon:'⚙'},
  {id:'schema_gen',label:'Schema Gen',icon:'📋'},
  {id:'data_load',label:'Data Load',icon:'⚡'},
  {id:'validate',label:'Validate',icon:'✅'},
  {id:'complete',label:'Complete',icon:'🎉'}
];

/* == Stepper Component == */
function Stepper({steps, currentIdx}){
  return <div className="stepper">{steps.map((s,i)=>{
    const done=i<currentIdx, active=i===currentIdx, locked=i>currentIdx;
    return <div className="step" key={s.id}>
      {i<steps.length-1 && <div className="step-line" style={done?{background:'var(--green)'}:{}}/>}
      <div className={`step-dot ${done?'done':''} ${active?'active':''} ${locked?'locked':''}`}>
        {done?'✓':i+1}
      </div>
      <div className={`step-label ${done?'done':''} ${active?'active':''}`}>{s.icon} {s.label}</div>
    </div>
  })}</div>
}

/* == Phase 1: Source DB Config == */
function SourceConfig({config, setConfig}){
  return <div className="card">
    <h3 style={{fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
      <span style={{color:'var(--cyan)'}}>◆</span> Source Database Connection
    </h3>
    <div className="grid-2" style={{gap:16}}>
      <div><label>Database Type</label>
        <select value={config.engine} onChange={e=>setConfig({...config,engine:e.target.value})}>
          <option value="">Select source...</option>
          {DB_ENGINES.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
        </select></div>
      <div><label>Host</label><input placeholder="e.g. db.company.com" value={config.host} onChange={e=>setConfig({...config,host:e.target.value})}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div><label>Port</label><input value={config.port} onChange={e=>setConfig({...config,port:e.target.value})}/></div>
        <div><label>Database</label><input placeholder="production_db" value={config.database} onChange={e=>setConfig({...config,database:e.target.value})}/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div><label>Username</label><input value={config.user} onChange={e=>setConfig({...config,user:e.target.value})}/></div>
        <div><label>Password</label><input type="password" value={config.pass} onChange={e=>setConfig({...config,pass:e.target.value})}/></div>
      </div>
    </div>
  </div>
}

/* == Connection Tester Component == */
function ConnectionTester({config}){
  const [testing, setTesting] = useState(false);
  const [result, setResult] = useState(null);

  const testConnection = ()=>{
    setTesting(true);
    setResult(null);
    setTimeout(()=>{
      const latency = Math.floor(Math.random()*150)+20;
      setResult({status:'success',latency,poolSize:4});
      setTesting(false);
    }, 1500);
  };

  return <div style={{marginTop:16}}>
    <button className="btn btn-sm btn-outline" onClick={testConnection} disabled={!config.engine || testing}>
      {testing?'🔄 Testing...':'🔌 Test Connection'}
    </button>
    {result && <div className={`connection-test ${result.status}`} style={{marginTop:12}}>
      <div className="status"/>
      <div style={{fontSize:'.85rem'}}>
        <span style={{fontWeight:700,color:'var(--green)'}}>Connected</span>
        <span style={{color:'var(--muted)',marginLeft:16}}>Latency: {result.latency}ms</span>
        <span style={{color:'var(--muted)',marginLeft:16}}>Pool: {result.poolSize} connections</span>
      </div>
    </div>}
  </div>
}

/* == Analysis Simulation == */
function AnalysisSimulation({sourceConfig, onComplete}){
  const [stepIdx, setStepIdx] = useState(0);
  const [logs, setLogs] = useState([]);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const logRef = useRef(null);
  const timers = useRef([]);

  const addLog = useCallback((text, color)=>{
    setLogs(prev=>[...prev,{text,color,ts:Date.now()}]);
  },[]);

  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight},[logs]);
  useEffect(()=>()=>timers.current.forEach(clearTimeout),[]);

  const sched = (fn,ms)=>{const t=setTimeout(fn,ms);timers.current.push(t)};

  const runAnalysis = ()=>{
    setRunning(true); setLogs([]); setStepIdx(0); timers.current=[];
    const eng = DB_ENGINES.find(d=>d.id===sourceConfig.engine);
    const dbName = eng?eng.name:'Database';
    const steps = [
      [{t:0,msg:`Connecting to ${dbName} at ${sourceConfig.host||'localhost'}:${sourceConfig.port||'5432'}...`,c:'var(--cyan)'},{t:600,msg:'  ✓ TCP connection established',c:'var(--green)'},{t:1000,msg:'  ✓ Authentication successful',c:'var(--green)'},{t:1300,msg:`  ✓ Database "${sourceConfig.database||'production_db'}" accessible`,c:'var(--green)'},{t:1600,msg:'  ✓ Connection pool initialized (4 connections)',c:'var(--green)'}],
      [{t:0,msg:'\n📋 Schema Analysis Agent starting...',c:'var(--purple)'},{t:400,msg:'  Introspecting catalog metadata...',c:'var(--muted)'},{t:900,msg:'  ✓ Found 47 tables, 312 columns, 23 indexes',c:'var(--green)'},{t:1300,msg:'  ✓ Found 18 foreign key constraints',c:'var(--green)'},{t:1600,msg:'  ✓ Found 5 unique constraints, 12 check constraints',c:'var(--green)'},{t:1900,msg:'  ✓ Mapped 38 data types across columns',c:'var(--green)'},{t:2200,msg:'  ⚠ 3 columns use deprecated types (MONEY, NTEXT, IMAGE)',c:'var(--amber)'},{t:2500,msg:'  ✓ Schema topology graph built (depth: 6 levels)',c:'var(--green)'}],
      [{t:0,msg:'\n📊 Data Profiling Agent starting...',c:'var(--purple)'},{t:400,msg:'  Sampling data distributions...',c:'var(--muted)'},{t:900,msg:'  ✓ Total rows: 2,847,391 across 47 tables',c:'var(--green)'},{t:1200,msg:'  ✓ Total data size: 4.2 GB (3.1 GB data + 1.1 GB indexes)',c:'var(--green)'},{t:1500,msg:'  ✓ Largest table: orders (892,441 rows, 1.3 GB)',c:'var(--green)'},{t:1800,msg:'  ⚠ NULL rate > 50% in 8 columns across 4 tables',c:'var(--amber)'},{t:2100,msg:'  ✓ Data type distribution analysis complete',c:'var(--green)'},{t:2400,msg:'  ✓ Cardinality analysis: 12 low-cardinality columns identified',c:'var(--green)'}],
      [{t:0,msg:'\n🔗 Dependency Mapping Agent starting...',c:'var(--purple)'},{t:400,msg:'  Walking FK dependency graph...',c:'var(--muted)'},{t:800,msg:'  ✓ 18 FK relationships mapped',c:'var(--green)'},{t:1100,msg:'  ✓ Topological sort: 6 dependency levels',c:'var(--green)'},{t:1400,msg:'  ⚠ 3 circular dependency groups detected',c:'var(--amber)'},{t:1700,msg:'  ✓ 12 views analyzed (4 materialized, 8 standard)',c:'var(--green)'},{t:2000,msg:'  ✓ Cross-schema references: 2 found',c:'var(--green)'}],
      [{t:0,msg:'\n⚙ Stored Procedure Analysis Agent starting...',c:'var(--purple)'},{t:400,msg:'  Parsing procedure definitions...',c:'var(--muted)'},{t:800,msg:'  ✓ 14 stored procedures analyzed',c:'var(--green)'},{t:1100,msg:'  ✓ 8 triggers analyzed (3 BEFORE, 5 AFTER)',c:'var(--green)'},{t:1400,msg:'  ✓ 6 user-defined functions analyzed',c:'var(--green)'},{t:1700,msg:'  ⚠ 4 procedures use vendor-specific syntax (non-portable)',c:'var(--amber)'},{t:2000,msg:'  ✗ 2 triggers reference system tables directly',c:'var(--red)'},{t:2300,msg:'  ⚠ Compatibility score: 71% (needs manual review)',c:'var(--amber)'}],
      [{t:0,msg:'\n⚡ Performance Baseline Agent starting...',c:'var(--purple)'},{t:400,msg:'  Capturing query performance statistics...',c:'var(--muted)'},{t:800,msg:'  ✓ Avg query response time: 23ms',c:'var(--green)'},{t:1100,msg:'  ⚠ 3 slow queries identified (> 500ms)',c:'var(--amber)'},{t:1400,msg:'  ✓ Index usage efficiency: 87%',c:'var(--green)'},{t:1700,msg:'  ✓ Table scan ratio: 4.2% (acceptable)',c:'var(--green)'},{t:2000,msg:'  ✓ Connection pool utilization: 62%',c:'var(--green)'}],
      [{t:0,msg:'\n🔒 Security & Compliance Audit Agent starting...',c:'var(--purple)'},{t:400,msg:'  Scanning permissions and access patterns...',c:'var(--muted)'},{t:800,msg:'  ✓ 22 database users/roles audited',c:'var(--green)'},{t:1100,msg:'  ⚠ 5 users have excessive privileges (SUPERUSER/DBA)',c:'var(--amber)'},{t:1400,msg:'  ✗ 2 columns contain unencrypted PII (email, SSN)',c:'var(--red)'},{t:1700,msg:'  ⚠ Audit logging: partially configured',c:'var(--amber)'},{t:2000,msg:'  ✓ SSL/TLS: enabled for all connections',c:'var(--green)'},{t:2300,msg:'  ⚠ Row-level security: not configured',c:'var(--amber)'}],

    let globalDelay = 0;

    });

    sched(()=>{

      setStepIdx(ANALYSIS_STEPS.length);
      onComplete();

  return <div>

/* == Schema Diff Viewer == */
function SchemaDiffViewer(){
  const sourceSchema = `CREATE TABLE orders (
  id INTEGER PRIMARY KEY,
  customer_id INTEGER NOT NULL,
  order_date TIMESTAMP,
  total DECIMAL(10,2),
  status VARCHAR(50),
  FOREIGN KEY (customer_id) REFERENCES customers(id)
);

CREATE INDEX idx_order_date ON orders(order_date);
CREATE INDEX idx_customer ON orders(customer_id);`;

  const targetSchema = `CREATE TABLE orders (
  id INTEGER PRIMARY KEY,
  customer_id INTEGER NOT NULL,
  order_date TIMESTAMP WITH TIME ZONE,
  total NUMERIC(10,2),
  status VARCHAR(50),
  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
  FOREIGN KEY (customer_id) REFERENCES customers(id)
);

CREATE INDEX idx_order_date ON orders(order_date);
CREATE INDEX idx_customer ON orders(customer_id);
CREATE INDEX idx_status ON orders(status);`;

  return <div className="card">

    </h3>

      </div>
      <div className="comparison-panel">

        <div className="comparison-code">{targetSchema}</div>
      </div>
    </div>
    <div style={{marginTop:16,fontSize:'.85rem',color:'var(--muted)'}}>
      <p><span style={{color:'var(--amber)'}}>⚠ Changes:</span> TIMESTAMP WITH TIME ZONE added for timezone handling, created_at default timestamp added, additional index on status column</p>

}

      ].map((g,i)=><div key={i} className={`gap-item ${g.sev}`}>
        <div className="gap-title">{g.sev==='critical'?'✗':g.sev==='warning'?'⚠':'ℹ'} {g.title}</div>
        <div className="gap-desc">{g.desc}</div>
      </div>)}
    </div>

    <div className="card report-section" style={{marginBottom:24}}>
      <h3>🔒 Security & Compliance Audit</h3>
      <div className="grid-2">
        <div>
          <h4 style={{fontSize:'.9rem',fontWeight:700,marginBottom:12,color:'var(--muted)'}}>Findings</h4>
          {[
            {ok:false,t:'2 columns with unencrypted PII (email, SSN)'},
            {ok:false,t:'5 users with excessive privileges'},
            {ok:false,t:'Row-level security not configured'},
            {ok:true,t:'SSL/TLS enabled for all connections'},
            {ok:true,t:'Password policy enforced'},
          ].map((f,i)=><div key={i} style={{fontSize:'.82rem',marginBottom:8,display:'flex',gap:8}}>
            <span style={{color:f.ok?'var(--green)':'var(--red)'}}>{f.ok?'✓':'✗'}</span>
            <span>{f.t}</span>
          </div>)}
        </div>
        <div>
          <h4 style={{fontSize:'.9rem',fontWeight:700,marginBottom:12,color:'var(--muted)'}}>Recommendations</h4>
          {[
            'Encrypt PII columns before migration',
            'Revoke SUPERUSER from application accounts',
            'Implement row-level security policies',
            'Enable full audit logging on target',
          ].map((r,i)=><div key={i} style={{fontSize:'.82rem',marginBottom:8,paddingLeft:16,borderLeft:'2px solid var(--cyan)',color:'var(--muted)'}}>{r}</div>)}
        </div>
      </div>
    </div>

    <div className="card report-section" style={{marginBottom:24}}>
      <h3>⚡ Performance Baselines</h3>
      <div className="grid-3">
        {[{l:'Avg Query Time',v:'23ms',c:'var(--green)',note:'Good'},{l:'Index Usage',v:'87%',c:'var(--green)',note:'Healthy'},{l:'Table Scan Ratio',v:'4.2%',c:'var(--green)',note:'Acceptable'}
        ].map(m=><div className="card" key={m.l} style={{padding:16,textAlign:'center'}}>
          <div style={{fontSize:'1.4rem',fontWeight:800,color:m.c}}>{m.v}</div>
          <div style={{fontSize:'.78rem',color:'var(--muted)'}}>{m.l}</div>
        </div>)}
      </div>
    </div>

    <RollbackPlanSection/>

    <div className="card report-section" style={{marginBottom:24}}>
      <h3>💡 AI Recommendations</h3>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {[
          {pri:'HIGH',c:'var(--red)',t:'Resolve missing primary keys on 12 tables',d:'Data validation depends on PKs. Add surrogate keys where needed.'},
          {pri:'HIGH',c:'var(--red)',t:'Encrypt PII columns before migration',d:'Use column-level encryption or transparent data encryption.'},
          {pri:'MED',c:'var(--amber)',t:'Drop 7 unused indexes',d:'Saves ~340 MB transfer and reduces migration time.'},
        ].map((r,i)=><div key={i} style={{display:'flex',gap:12,alignItems:'flex-start'}}>
          <span className="tag" style={{background:r.c+'20',color:r.c,minWidth:40,textAlign:'center'}}>{r.pri}</span>
          <div><div style={{fontWeight:700,fontSize:'.88rem'}}>{r.t}</div><div style={{fontSize:'.8rem',color:'var(--muted)',marginTop:2}}>{r.d}</div></div>

    <div className="card report-section">
      <h3>💰 Cost & Duration Estimate</h3>
      <div className="grid-3">

          <div style={{fontSize:'.78rem',color:'var(--muted)'}}>Estimated Migration Time</div>
        </div>
        <div className="card" style={{padding:16,textAlign:'center',border:'1px solid var(--amber)'}}>
          <div style={{fontSize:'1.3rem',fontWeight:800,color:'var(--amber)'}}>15-30 min</div>
          <div style={{fontSize:'.78rem',color:'var(--muted)'}}>Expected Downtime</div>
        </div>

          <div style={{fontSize:'1.3rem',fontWeight:800,color:'var(--green)'}}>4.2 GB</div>
          <div style={{fontSize:'.78rem',color:'var(--muted)'}}>Data Transfer Size</div>

/* == Phase 2: Migration == */
function MigrationPhase({sourceConfig}){
  const [targetConfig, setTargetConfig] = useState({engine:'',cloud:'',host:'',port:'5432',database:'migration_target',user:'',pass:''});
  const [migrationStep, setMigrationStep] = useState(0);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const [logs, setLogs] = useState([]);
  const logRef = useRef(null);
  const timers = useRef([]);

  const addLog = useCallback((text,color)=>{setLogs(prev=>[...prev,{text,color}])},[]);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight},[logs]);
  useEffect(()=>()=>timers.current.forEach(clearTimeout),[]);
  const sched = (fn,ms)=>{const t=setTimeout(fn,ms);timers.current.push(t)};

  const runMigration = ()=>{
    setRunning(true);setLogs([]);setMigrationStep(0);timers.current=[];
    const steps = [
      [{t:0,msg:'⚙ Configuring migration pipeline...',c:'var(--cyan)'},{t:500,msg:'  ✓ Source connection verified',c:'var(--green)'},{t:800,msg:'  ✓ Target connection verified',c:'var(--green)'},{t:1100,msg:'  ✓ Pre-migration checks passed',c:'var(--green)'}],
      [{t:0,msg:'\n📋 Schema Generation Agent starting...',c:'var(--purple)'},{t:500,msg:'  Generating DDL for 47 tables...',c:'var(--muted)'},{t:1000,msg:'  ✓ 38 type mappings applied',c:'var(--green)'},{t:1400,msg:'  ✓ Topological sort: creating tables in dependency order',c:'var(--green)'},{t:1800,msg:'  ✓ 23 indexes created',c:'var(--green)'},{t:2200,msg:'  ✓ 18 FK constraints created',c:'var(--green)'},{t:2500,msg:'  ✓ Schema creation complete',c:'var(--green)'}],
      [{t:0,msg:'\n⚡ Data Load Agent starting...',c:'var(--purple)'},{t:400,msg:'  Loading data in batches of 10,000 rows...',c:'var(--muted)'},
        {t:1000,msg:'  [customers] 245,892 rows ✓ (12s)',c:'var(--green)'},
        {t:1800,msg:'  [products] 18,445 rows ✓ (2s)',c:'var(--green)'},
        {t:2600,msg:'  [orders] 892,441 rows ✓ (48s)',c:'var(--green)'},
        {t:3400,msg:'  [order_items] 1,523,891 rows ✓ (1m 22s)',c:'var(--green)'},
        {t:4200,msg:'  [payments] 445,892 rows ✓ (24s)',c:'var(--green)'},
        {t:4800,msg:'  ✓ All 2,847,391 rows loaded across 47 tables',c:'var(--green)'}],
      [{t:0,msg:'\n✅ Validation Agent starting...',c:'var(--purple)'},
        {t:500,msg:'  Comparing row counts...',c:'var(--muted)'},
        {t:1000,msg:'  ✓ Row counts match: 47/47 tables',c:'var(--green)'},
        {t:1500,msg:'  Computing checksums...',c:'var(--muted)'},
        {t:2000,msg:'  ✓ Checksums match: 47/47 tables',c:'var(--green)'},
        {t:2500,msg:'  ✓ Constraint validation passed',c:'var(--green)'}],
      [{t:0,msg:'\n🎉 Migration Complete!',c:'var(--green)'},
        {t:400,msg:'  Duration: 2h 08m 34s',c:'var(--cyan)'},
        {t:700,msg:'  Rows migrated: 2,847,391',c:'var(--cyan)'},
        {t:1000,msg:'  Data transferred: 4.2 GB',c:'var(--cyan)'},
        {t:1300,msg:'  Validation: PASSED (100% integrity)',c:'var(--green)'},
        {t:1600,msg:'  Status: SUCCESS',c:'var(--green)'}],
    ];
    let gd=0;
    steps.forEach((sm,si)=>{
      const sd=gd;
      sm.forEach(m=>{sched(()=>addLog(m.msg,m.c),sd+m.t)});
      const mx=Math.max(...sm.map(m=>m.t));
      if(si<steps.length-1) sched(()=>setMigrationStep(si+1),sd+mx+200);
      gd+=mx+400;
    });
    sched(()=>{setDone(true);setRunning(false);setMigrationStep(MIGRATION_STEPS.length)},gd+200);
  };

  return <div className="container">
    <h2 className="section-title">Phase 2: Migration Execution</h2>
    <p className="section-sub">Configure your target database and execute the AI-powered migration pipeline.</p>

    <div className="card" style={{marginBottom:24}}>
      <h3 style={{fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
        <span style={{color:'var(--purple)'}}>◆</span> Target Database Configuration
      </h3>
      <div className="grid-2" style={{gap:16}}>
        <div><label>Cloud / Target</label>
          <select value={targetConfig.cloud} onChange={e=>setTargetConfig({...targetConfig,cloud:e.target.value})}>
            <option value="">Select target...</option>
            <option value="aws">AWS (RDS / Aurora)</option>
            <option value="azure">Azure (SQL Database / Cosmos)</option>
            <option value="gcp">GCP (Cloud SQL / AlloyDB)</option>
            <option value="onprem">On-Premise</option>
          </select></div>
        <div><label>Target Database Type</label>
          <select value={targetConfig.engine} onChange={e=>setTargetConfig({...targetConfig,engine:e.target.value})}>
            <option value="">Select target DB...</option>
            {DB_ENGINES.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
          </select></div>
        <div><label>Target Host</label><input placeholder="e.g. mydb.rds.amazonaws.com" value={targetConfig.host} onChange={e=>setTargetConfig({...targetConfig,host:e.target.value})}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div><label>Port</label><input value={targetConfig.port} onChange={e=>setTargetConfig({...targetConfig,port:e.target.value})}/></div>
          <div><label>Database</label><input value={targetConfig.database} onChange={e=>setTargetConfig({...targetConfig,database:e.target.value})}/></div>
        </div>
      </div>
      <ConnectionTester config={targetConfig}/>
    </div>

    <Stepper steps={MIGRATION_STEPS} currentIdx={migrationStep}/>

    {!running && !done && <div style={{textAlign:'center',padding:'32px 0'}}>
      <button className="btn btn-primary" onClick={runMigration} style={{fontSize:'1rem',padding:'14px 36px'}}>
        🚀 Execute Migration
      </button>
    </div>}

    {(running||done) && <div className="log-box" ref={logRef}>
      {logs.map((l,i)=><div key={i} className="log-line" style={{color:l.color}}>{l.text}</div>)}
      {running && <span style={{animation:'pulse 1s infinite',color:'var(--cyan)'}}>▋</span>}
    </div>}

    {running && <ProgressMetrics running={true}/>}

    {done && <div className="gate-banner" style={{borderColor:'rgba(34,197,94,.3)',background:'linear-gradient(135deg,rgba(34,197,94,.08),rgba(6,182,212,.08))'}}>
      <h3 style={{color:'var(--green)'}}>✓ Migration Completed Successfully</h3>
      <p>All 2,847,391 rows migrated and validated with 100% data integrity.</p>
      <div className="grid-4" style={{maxWidth:600,margin:'0 auto'}}>
        {[{n:'2h 08m',l:'Duration'},{n:'2.8M',l:'Rows'},{n:'4.2 GB',l:'Data'},{n:'100%',l:'Integrity'}].map(s=>
          <div key={s.l} style={{textAlign:'center'}}>
            <div style={{fontSize:'1.2rem',fontWeight:800,color:'var(--green)'}}>{s.n}</div>
            <div style={{fontSize:'.72rem',color:'var(--muted)'}}>{s.l}</div>
          </div>
        )}
      </div>
    </div>}
  </div>
}

/* == Main App == */
function App(){
  const [phase, setPhase] = useState(1);
  const [analysisComplete, setAnalysisComplete] = useState(false);
  const [approved, setApproved] = useState(false);
  const [showReport, setShowReport] = useState(false);
  const [theme, setTheme] = useState('dark');
  const [sourceConfig, setSourceConfig] = useState({engine:'',host:'',port:'5432',database:'',user:'admin',pass:'password'});

  useEffect(()=>{
    document.body.className = `${theme}-theme`;
  }, [theme]);

  const toggleTheme = ()=>{
    setTheme(theme==='dark'?'light':'dark');
  };

  const goPhase2 = ()=>{ if(approved) setPhase(2); };

  return <>
    <nav>
      <div className="nav-brand">
        <span style={{fontSize:'1.2rem'}}>🗄</span> DB Migration Agent
      </div>
      <div className="nav-spacer"/>
      <div className="nav-controls">
        <button className="theme-toggle" onClick={toggleTheme} title="Toggle theme">
          {theme==='dark'?'☀':'🌙'}
        </button>
        <div className="nav-phase">
          <button className={phase===1?'active':''} onClick={()=>setPhase(1)}>
            <span className="phase-badge badge-analysis">P1</span> Analysis
            {analysisComplete && <span style={{color:'var(--green)',fontSize:'.75rem'}}>✓</span>}
          </button>
          <button className={phase===2?'active':approved?'':'locked'} onClick={goPhase2}>
            <span className="phase-badge badge-migrate">P2</span> Migration
            {!approved && <span style={{fontSize:'.75rem'}}>🔒</span>}
          </button>
        </div>
      </div>
    </nav>

    {phase===1 && <div className="container">
      <h2 className="section-title">Phase 1: Database Analysis</h2>
      <p className="section-sub">Comprehensive as-is impact assessment. Every table, column, constraint, procedure, and administration gap — nothing left uncovered.</p>

      <SourceConfig config={sourceConfig} setConfig={setSourceConfig}/>
      <ConnectionTester config={sourceConfig}/>

      <div style={{marginTop:24}}>
        <AnalysisSimulation sourceConfig={sourceConfig} onComplete={()=>{setAnalysisComplete(true);setShowReport(true)}}/>
      </div>

      {showReport && <>
        <div style={{margin:'32px 0 24px',borderTop:'1px solid var(--border)',paddingTop:24}}>
          <h3 style={{fontSize:'1.3rem',fontWeight:800,marginBottom:4}}>📝 Comprehensive Analysis Report</h3>
          <p style={{color:'var(--muted)',fontSize:'.88rem'}}>Full findings from all analysis agents. Review carefully before proceeding to migration.</p>
        </div>
        <AnalysisReport sourceConfig={sourceConfig}/>
        <MigrationHistory/>

        {!approved && <div className="gate-banner">
          <h3>🛡 Analysis Review Gate</h3>
          <p>Review all findings above. Approve to unlock Phase 2: Migration.</p>
          <div style={{display:'flex',gap:12,justifyContent:'center'}}>
            <button className="btn btn-success" onClick={()=>setApproved(true)}>
              ✓ Approve & Unlock Migration
            </button>
            <button className="btn btn-outline" onClick={()=>{setShowReport(false);setAnalysisComplete(false)}}>
              🔄 Re-run Analysis
            </button>
          </div>
        </div>}

        {approved && <div className="gate-banner" style={{borderColor:'rgba(34,197,94,.3)',background:'linear-gradient(135deg,rgba(34,197,94,.08),rgba(6,182,212,.08))'}}>
          <h3 style={{color:'var(--green)'}}>✓ Analysis Approved</h3>
          <p>Phase 2: Migration is now unlocked.</p>
          <button className="btn btn-primary" onClick={()=>setPhase(2)}>
            🚀 Proceed to Migration
          </button>
        </div>}
      </>}
    </div>}

    {phase===2 && !approved && <div className="container">
      <div className="lock-msg">
        <div style={{fontSize:'3rem',marginBottom:16}}>🔒</div>
        <h3>Phase 2: Migration is Locked</h3>
        <p style={{maxWidth:500,margin:'0 auto'}}>Complete Phase 1 analysis and approve the findings to unlock the migration pipeline.</p>
        <button className="btn btn-outline" style={{marginTop:20}} onClick={()=>setPhase(1)}>
          ← Go to Phase 1: Analysis
        </button>
      </div>
    </div>}

    {phase===2 && approved && <MigrationPhase sourceConfig={sourceConfig}/>}

    <footer style={{textAlign:'center',padding:'48px 24px',color:'var(--dim)',fontSize:'.8rem',borderTop:'1px solid var(--border)',marginTop:48}}>
      DB Migration Agent — AI-Powered Multi-Agent Database Migration
    </footer>
  </>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
