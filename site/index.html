<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DB Migration Agent &#8212; AI-Powered Database Migration</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2332;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--cyan:#06b6d4;--purple:#a855f7;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--grad:linear-gradient(135deg,#06b6d4,#a855f7)}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
    code{font-family:'JetBrains Mono',monospace}
    a{color:var(--cyan);text-decoration:none}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideRight{from{width:0}to{width:100%}}
    .fade-in{animation:fadeIn .5s ease both}
    nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:56px}
    .nav-brand{font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:8px;margin-right:32px;white-space:nowrap}
    .nav-phase{display:flex;gap:4px;margin-left:auto}
    .nav-phase button{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 18px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:6px}
    .nav-phase button.active{background:var(--bg3);color:var(--cyan);border-color:var(--cyan)}
    .nav-phase button.locked{opacity:.45;cursor:not-allowed}
    .nav-phase button:not(.locked):hover{border-color:var(--cyan);color:var(--text)}
    .phase-badge{font-size:.65rem;padding:2px 7px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .badge-analysis{background:rgba(6,182,212,.15);color:var(--cyan)}
    .badge-migrate{background:rgba(168,85,247,.15);color:var(--purple)}
    .container{max-width:1200px;margin:0 auto;padding:32px 24px}
    .section-title{font-size:2rem;font-weight:900;margin-bottom:8px}
    .section-sub{color:var(--muted);margin-bottom:32px;font-size:1rem}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px}
    .btn{padding:10px 24px;border-radius:8px;border:none;font-weight:700;font-size:.88rem;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
    .btn-primary{background:var(--grad);color:#fff}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-outline:hover{border-color:var(--cyan)}
    .btn-success{background:var(--green);color:#fff}
    .btn-success:hover{opacity:.9}
    .btn-danger{background:var(--red);color:#fff}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    label{font-size:.8rem;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
    select,input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:.88rem;font-family:inherit}
    select:focus,input:focus{outline:none;border-color:var(--cyan)}
    .progress-bar{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:8px 0}
    .progress-fill{height:100%;background:var(--grad);border-radius:3px;transition:width .4s ease}
    .stepper{display:flex;gap:0;margin-bottom:32px}
    .step{flex:1;text-align:center;position:relative;padding:16px 8px 0}
    .step-line{position:absolute;top:28px;left:50%;right:-50%;height:2px;background:var(--border);z-index:0}
    .step:last-child .step-line{display:none}
    .step-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;position:relative;z-index:1;transition:all .3s}
    .step-dot.done{background:var(--green);border-color:var(--green);color:#fff}
    .step-dot.active{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,.25)}
    .step-dot.locked{opacity:.4}
    .step-label{font-size:.7rem;color:var(--dim);margin-top:6px;font-weight:600}
    .step-label.active{color:var(--cyan)}
    .step-label.done{color:var(--green)}
    .log-box{background:#0d1117;border:1px solid var(--border);border-radius:10px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:.78rem;max-height:400px;overflow-y:auto;line-height:1.7}
    .log-line{animation:fadeIn .3s ease both}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600;margin-right:4px}
    .tag-ok{background:rgba(34,197,94,.12);color:var(--green)}
    .tag-warn{background:rgba(245,158,11,.12);color:var(--amber)}
    .tag-err{background:rgba(239,68,68,.12);color:var(--red)}
    .tag-info{background:rgba(6,182,212,.12);color:var(--cyan)}
    .report-section{margin-bottom:24px}
    .report-section h3{font-size:1.05rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .report-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .report-table th{text-align:left;padding:10px 12px;background:var(--bg3);color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
    .report-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
    .report-table tr:hover td{background:rgba(6,182,212,.03)}
    .score-ring{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900}
    .risk-low{background:conic-gradient(var(--green) var(--pct),var(--bg3) 0);color:var(--green)}
    .risk-med{background:conic-gradient(var(--amber) var(--pct),var(--bg3) 0);color:var(--amber)}
    .risk-high{background:conic-gradient(var(--red) var(--pct),var(--bg3) 0);color:var(--red)}
    .gap-item{padding:14px 16px;border-left:3px solid var(--amber);background:rgba(245,158,11,.04);border-radius:0 8px 8px 0;margin-bottom:10px}
    .gap-item.critical{border-left-color:var(--red);background:rgba(239,68,68,.04)}
    .gap-item.info{border-left-color:var(--cyan);background:rgba(6,182,212,.04)}
    .gap-title{font-weight:700;font-size:.88rem;margin-bottom:4px}
    .gap-desc{font-size:.8rem;color:var(--muted)}
    .gate-banner{background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(168,85,247,.08));border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:32px;text-align:center;margin:32px 0}
    .gate-banner h3{font-size:1.3rem;font-weight:800;margin-bottom:8px}
    .gate-banner p{color:var(--muted);margin-bottom:20px}
    .lock-msg{text-align:center;padding:80px 24px;color:var(--dim)}
    .lock-msg h3{font-size:1.4rem;margin-bottom:8px}
    @media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.stepper{flex-wrap:wrap}.step-line{display:none}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* == Data == */
const DB_ENGINES = [
  {id:'postgresql',name:'PostgreSQL',icon:'\u{1F418}',color:'#336791'},
  {id:'mysql',name:'MySQL',icon:'\u{1F42C}',color:'#4479A1'},
  {id:'sqlserver',name:'SQL Server',icon:'\u{1F4BE}',color:'#CC2927'},
  {id:'oracle',name:'Oracle',icon:'\u{1F534}',color:'#F80000'},
  {id:'sybase',name:'Sybase ASE',icon:'\u{1F7E2}',color:'#6DB33F'}
];

const ANALYSIS_STEPS = [
  {id:'connect',label:'Connect',icon:'\u{1F50C}'},
  {id:'schema',label:'Schema',icon:'\u{1F4CB}'},
  {id:'data',label:'Data Profile',icon:'\u{1F4CA}'},
  {id:'deps',label:'Dependencies',icon:'\u{1F517}'},
  {id:'procs',label:'Procedures',icon:'\u{2699}'},
  {id:'perf',label:'Performance',icon:'\u{26A1}'},
  {id:'security',label:'Security',icon:'\u{1F512}'},
  {id:'gaps',label:'Admin Gaps',icon:'\u{1F50D}'},
  {id:'risk',label:'Risk Score',icon:'\u{1F6E1}'},
  {id:'report',label:'Report',icon:'\u{1F4DD}'}
];

const MIGRATION_STEPS = [
  {id:'config',label:'Configure',icon:'\u{2699}'},
  {id:'schema_gen',label:'Schema Gen',icon:'\u{1F4CB}'},
  {id:'data_load',label:'Data Load',icon:'\u{26A1}'},
  {id:'validate',label:'Validate',icon:'\u{2705}'},
  {id:'complete',label:'Complete',icon:'\u{1F389}'}
];

/* == Stepper Component == */
function Stepper({steps, currentIdx}){
  return <div className="stepper">{steps.map((s,i)=>{
    const done=i<currentIdx, active=i===currentIdx, locked=i>currentIdx;
    return <div className="step" key={s.id}>
      {i<steps.length-1 && <div className="step-line" style={done?{background:'var(--green)'}:{}}/>}
      <div className={`step-dot ${done?'done':''} ${active?'active':''} ${locked?'locked':''}`}>
        {done?'\u2713':i+1}
      </div>
      <div className={`step-label ${done?'done':''} ${active?'active':''}`}>{s.icon} {s.label}</div>
    </div>
  })}</div>
}

/* == Phase 1: Source DB Config == */
function SourceConfig({config, setConfig}){
  return <div className="card">
    <h3 style={{fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
      <span style={{color:'var(--cyan)'}}>{'\u25C6'}</span> Source Database Connection
    </h3>
    <div className="grid-2" style={{gap:16}}>
      <div><label>Database Type</label>
        <select value={config.engine} onChange={e=>setConfig({...config,engine:e.target.value})}>
          <option value="">Select source...</option>
          {DB_ENGINES.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
        </select></div>
      <div><label>Host</label><input placeholder="e.g. db.company.com" value={config.host} onChange={e=>setConfig({...config,host:e.target.value})}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div><label>Port</label><input value={config.port} onChange={e=>setConfig({...config,port:e.target.value})}/></div>
        <div><label>Database</label><input placeholder="production_db" value={config.database} onChange={e=>setConfig({...config,database:e.target.value})}/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div><label>Username</label><input value={config.user} onChange={e=>setConfig({...config,user:e.target.value})}/></div>
        <div><label>Password</label><input type="password" value={config.pass} onChange={e=>setConfig({...config,pass:e.target.value})}/></div>
      </div>
    </div>
  </div>
}

/* == Phase 2: Migration == */
function MigrationPhase({sourceConfig}){
  const [targetConfig, setTargetConfig] = useState({engine:'',cloud:'',host:'',port:'5432',database:'migration_target',user:'',pass:''});
  const [migrationStep, setMigrationStep] = useState(0);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const [logs, setLogs] = useState([]);
  const logRef = useRef(null);
  const timers = useRef([]);

  const addLog = useCallback((text,color)=>{setLogs(prev=>[...prev,{text,color}])},[]);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight},[logs]);
  useEffect(()=>()=>timers.current.forEach(clearTimeout),[]);
  const sched = (fn,ms)=>{const t=setTimeout(fn,ms);timers.current.push(t)};

  const runMigration = ()=>{
    setRunning(true);setLogs([]);setMigrationStep(0);timers.current=[];
    const steps = [
      [{t:0,msg:'\u{2699} Configuring migration pipeline...',c:'var(--cyan)'},{t:500,msg:'  \u2713 Source connection verified',c:'var(--green)'},{t:800,msg:'  \u2713 Target connection verified',c:'var(--green)'},{t:1100,msg:'  \u2713 Pre-migration checks passed',c:'var(--green)'}],
      [{t:0,msg:'\n\u{1F4CB} Schema Generation Agent starting...',c:'var(--purple)'},{t:500,msg:'  Generating DDL for 47 tables...',c:'var(--muted)'},{t:1000,msg:'  \u2713 38 type mappings applied',c:'var(--green)'},{t:1400,msg:'  \u2713 Topological sort: creating tables in dependency order',c:'var(--green)'},{t:1800,msg:'  \u2713 23 indexes created',c:'var(--green)'},{t:2200,msg:'  \u2713 18 FK constraints created',c:'var(--green)'},{t:2500,msg:'  \u2713 Schema creation complete',c:'var(--green)'}],
      [{t:0,msg:'\n\u{26A1} Data Load Agent starting...',c:'var(--purple)'},{t:400,msg:'  Loading data in batches of 10,000 rows...',c:'var(--muted)'},
        {t:1000,msg:'  [customers] 245,892 rows \u2713 (12s)',c:'var(--green)'},
        {t:1800,msg:'  [products] 18,445 rows \u2713 (2s)',c:'var(--green)'},
        {t:2600,msg:'  [orders] 892,441 rows \u2713 (48s)',c:'var(--green)'},
        {t:3400,msg:'  [order_items] 1,523,891 rows \u2713 (1m 22s)',c:'var(--green)'},
        {t:4200,msg:'  [payments] 445,892 rows \u2713 (24s)',c:'var(--green)'},
        {t:4800,msg:'  \u2713 All 2,847,391 rows loaded across 47 tables',c:'var(--green)'}],
      [{t:0,msg:'\n\u{2705} Validation Agent starting...',c:'var(--purple)'},
        {t:500,msg:'  Comparing row counts...',c:'var(--muted)'},
        {t:1000,msg:'  \u2713 Row counts match: 47/47 tables',c:'var(--green)'},
        {t:1500,msg:'  Computing checksums...',c:'var(--muted)'},
        {t:2000,msg:'  \u2713 Checksums match: 47/47 tables',c:'var(--green)'},
        {t:2500,msg:'  Sampling rows for verification...',c:'var(--muted)'},
        {t:3000,msg:'  \u2713 Sample verification: 100% match (500 rows sampled)',c:'var(--green)'},
        {t:3300,msg:'  \u2713 Constraint validation passed',c:'var(--green)'}],
      [{t:0,msg:'\n\u{1F389} Migration Complete!',c:'var(--green)'},
        {t:400,msg:'  Duration: 2h 08m 34s',c:'var(--cyan)'},
        {t:700,msg:'  Rows migrated: 2,847,391',c:'var(--cyan)'},
        {t:1000,msg:'  Data transferred: 4.2 GB',c:'var(--cyan)'},
        {t:1300,msg:'  Validation: PASSED (100% integrity)',c:'var(--green)'},
        {t:1600,msg:'  Status: SUCCESS',c:'var(--green)'}],
    ];
    let gd=0;
    steps.forEach((sm,si)=>{
      const sd=gd;
      sm.forEach(m=>{sched(()=>addLog(m.msg,m.c),sd+m.t)});
      const mx=Math.max(...sm.map(m=>m.t));
      if(si<steps.length-1) sched(()=>setMigrationStep(si+1),sd+mx+200);
      gd;=mx+400;
    });
    sched(()=>{setDone(true);setRunning(false);setMigrationStep(MIGRATION_STEPS.length)},gd+200);
  };

  return <div className="container">
    <h2 className="section-title">Phase 2: Migration Execution</h2>
    <p className="section-sub">Configure your target database and execute the AI-powered migration pipeline.</p>

    <div className="card" style={{marginBottom:24}}>
      <h3 style={{fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
        <span style={{color:'var(--purple)'}}>{'\u25C6'}</span> Target Database Configuration
      </h3>
      <div className="grid-2" style={{gap:16}}>
        <div><label>Cloud / Target</label>
          <select value={targetConfig.cloud} onChange={e=>setTargetConfig({...targetConfig,cloud:e.target.value})}>
            <option value="">Select target...</option>
            <option value="aws">AWS (RDS / Aurora)</option>
            <option value="azure">Azure (SQL Database / Cosmos)</option>
            <option value="gcp">GCP (Cloud SQL / AlloyDB)</option>
            <option value="onprem">On-Premise</option>
          </select></div>
        <div><label>Target Database Type</label>
          <select value={targetConfig.engine} onChange={e=>setTargetConfig({...targetConfig,engine:e.target.value})}>
            <option value="">Select target DB...</option>
            {DB_ENGINES.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
          </select></div>
        <div><label>Target Host</label><input placeholder="e.g. mydb.rds.amazonaws.com" value={targetConfig.host} onChange={e=>setTargetConfig({...targetConfig,host:e.target.value})}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div><label>Port</label><input value={targetConfig.port} onChange={e=>setTargetConfig({...targetConfig,port:e.target.value})}/></div>
          <div><label>Database</label><input value={targetConfig.database} onChange={e=>setTargetConfig({...targetConfig,database:e.target.value})}/></div>
        </div>
      </div>
    </div>

    <Stepper steps={MIGRATION_STEPS} currentIdx={migrationStep}/>

    {!running && !done && <div style={{textAlign:'center',padding:'32px 0'}}>
      <button className="btn btn-primary" onClick={runMigration} style={{fontSize:'1rem',padding:'14px 36px'}}>
        {'\u{1F680}'} Execute Migration
      </button>
    </div>}

    {(running||done) && <div className="log-box" ref={logRef}>
      {logs.map((l,i)=><div key={i} className="log-line" style={{color:l.color}}>{l.text}</div>)}
      {running && <span style={{animation:'pulse 1s infinite',color:'var(--cyan)'}}>{'\u258B'}</span>}
    </div>}

    {done && <div className="gate-banner" style={{borderColor:'rgba(34,197,94,.3)',background:'linear-gradient(135deg,rgba(34,197,94,.08),rgba(6,182,212,.08))'}}>
      <h3 style={{color:'var(--green)'}}>{'\u2713'} Migration Completed Successfully</h3>
      <p>All 2,847,391 rows migrated and validated with 100% data integrity.</p>
      <div className="grid-4" style={{maxWidth:600,margin:'0 auto'}}>
        {[{n:'2h 08m',l:'Duration'},{n:'2.8M',l:'Rows'},{n:'4.2 GB',l:'Data'},{n:'100%',l:'Integrity'}].map(s=>
          <div key={s.l} style={{textAlign:'center'}}>
            <div style={{fontSize:'1.2rem',fontWeight:800,color:'var(--green)'}}>{s.n}</div>
            <div style={{fontSize:'.72rem',color:'var(--muted)'}}>{s.l}</div>
          </div>
        )}
      </div>
    </div>}
  </div>
}

        <AnalysisReport sourceConfig={sourceConfig}/>
