<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DB Migration Agent ГўВҖВ” AI-Powered Database Migration</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2332;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--cyan:#06b6d4;--purple:#a855f7;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--grad:linear-gradient(135deg,#06b6d4,#a855f7)}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
    code{font-family:'JetBrains Mono',monospace}
    a{color:var(--cyan);text-decoration:none}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .5s ease forwards}
    .spinner{width:16px;height:16px;border:2px solid var(--dim);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:.9rem;border:none;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--grad);color:#fff}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(6,182,212,.3)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn-outline:hover{border-color:var(--cyan);background:rgba(6,182,212,.05)}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;transition:all .3s}
    .card:hover{border-color:rgba(6,182,212,.3)}
    input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.9rem;font-family:inherit;width:100%;transition:border-color .2s}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan)}
    select{cursor:pointer}
    label{font-size:.85rem;font-weight:600;color:var(--muted);display:block;margin-bottom:6px}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .progress-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
    .tab{padding:8px 16px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent}
    .tab.active{background:rgba(6,182,212,.15);color:var(--cyan);border-color:rgba(6,182,212,.3)}
    .tab:not(.active){color:var(--dim)}
    .tab:not(.active):hover{color:var(--muted);background:rgba(255,255,255,.03)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    @media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
    .score-ring{width:120px;height:120px;position:relative}
    .score-ring svg{transform:rotate(-90deg)}
    .score-ring .value{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900}
    .terminal{background:#0d1117;border:1px solid var(--border);border-radius:10px;overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:.82rem}
    .terminal-bar{display:flex;gap:6px;padding:10px 14px;background:#161b22;border-bottom:1px solid var(--border)}
    .terminal-dot{width:10px;height:10px;border-radius:50%}
    .terminal-body{padding:16px;line-height:1.9;max-height:400px;overflow-y:auto}
    .risk-high{color:var(--red);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}
    .risk-medium{color:var(--amber);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
    .risk-low{color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ГўВ”ВҖГўВ”ВҖ DATA ГўВ”ВҖГўВ”ВҖ
const DB_TYPES = [
  {id:'postgresql',name:'PostgreSQL',icon:'Г°ВҹВҗВҳ',color:'#336791'},
  {id:'mysql',name:'MySQL',icon:'Г°ВҹВҗВ¬',color:'#4479A1'},
  {id:'sqlserver',name:'SQL Server',icon:'Г°ВҹВ’Вҫ',color:'#CC2927'},
  {id:'oracle',name:'Oracle',icon:'Г°ВҹВ”Вҙ',color:'#F80000'},
  {id:'sybase',name:'Sybase/SAP ASE',icon:'Г°ВҹВ”В·',color:'#0FAAFF'},
];
const CLOUD_TARGETS = [
  {id:'aws',name:'AWS RDS / Aurora',icon:'ГўВ–ВІ',color:'#FF9900'},
  {id:'azure',name:'Azure SQL',icon:'ГўВ—ВҶ',color:'#0078D4'},
  {id:'gcp',name:'Google Cloud SQL',icon:'ГўВ—ВҸ',color:'#4285F4'},
  {id:'onprem',name:'On-Premise',icon:'Г°ВҹВ–ВҘ',color:'#94a3b8'},
];
const AGENTS = [
  {id:'orchestrator',name:'Orchestrator Agent',role:'Coordinates all agents, manages workflow and risk gates',color:'var(--purple)',states:['IDLE','PLANNING','DISPATCHING','MONITORING','COMPLETED'],decisions:['Determine execution order','Gate on risk score','Trigger rollback on failure'],icon:'Г°ВҹВҺВҜ'},
  {id:'assessment',name:'Assessment Agent',role:'Analyzes schema complexity, data volumes, cross-DB compatibility, risk scoring',color:'var(--cyan)',states:['IDLE','CONNECTING','ANALYZING_SCHEMA','ANALYZING_DATA','SCORING','REPORTING'],decisions:['Evaluate type compatibility','Score migration risk 0-100','Estimate migration duration','Generate recommendations'],icon:'Г°ВҹВ”ВҚ'},
  {id:'schema',name:'Schema Agent',role:'Generates DDL, maps 60+ types across databases, topological FK ordering',color:'var(--cyan)',states:['IDLE','INTROSPECTING','MAPPING_TYPES','GENERATING_DDL','CREATING_TABLES','VERIFYING'],decisions:['Map source types to target','Resolve FK dependency order','Handle unsupported types with fallback'],icon:'Г°ВҹВ“ВӢ'},
  {id:'data',name:'Data Agent',role:'Extracts, transforms, and loads data with adaptive batching and checkpoints',color:'var(--green)',states:['IDLE','EXTRACTING','TRANSFORMING','LOADING','CHECKPOINTING'],decisions:['Calculate optimal batch size','Select bulk load method','Manage checkpoint recovery'],icon:'ГўВҡВЎ'},
  {id:'validation',name:'Validation Agent',role:'Row counts, MD5/SHA256 checksums, sample row comparison, constraint checks',color:'var(--amber)',states:['IDLE','COUNTING_ROWS','COMPUTING_CHECKSUMS','SAMPLING_ROWS','CHECKING_CONSTRAINTS'],decisions:['Compare row counts with tolerance','Verify data integrity via checksums','Flag constraint violations'],icon:'Г°ВҹВӣВЎ'},
  {id:'rollback',name:'Rollback Agent',role:'Reverts migration on failure ГўВҖВ” cloud backup restore or table drop',color:'var(--red)',states:['IDLE','ANALYZING_FAILURE','RESTORING_BACKUP','DROPPING_TABLES','VERIFYING_ROLLBACK'],decisions:['Determine rollback strategy','Choose backup restore vs drop','Verify clean rollback state'],icon:'ГўВҶВ©ГҜВёВҸ'},
];

const SAMPLE_TABLES = [
  {name:'users',rows:245000,cols:12,size:'48 MB',fks:0},
  {name:'orders',rows:1820000,cols:18,size:'312 MB',fks:2},
  {name:'products',rows:15400,cols:24,size:'8 MB',fks:1},
  {name:'order_items',rows:5400000,cols:8,size:'420 MB',fks:2},
  {name:'payments',rows:1790000,cols:14,size:'186 MB',fks:1},
  {name:'inventory',rows:89000,cols:10,size:'12 MB',fks:1},
  {name:'categories',rows:340,cols:6,size:'0.2 MB',fks:0},
  {name:'reviews',rows:672000,cols:9,size:'95 MB',fks:2},
  {name:'addresses',rows:198000,cols:11,size:'32 MB',fks:1},
  {name:'audit_log',rows:12400000,cols:7,size:'1.2 GB',fks:1},
];

// ГўВ”ВҖГўВ”ВҖ COMPONENTS ГўВ”ВҖГўВ”ВҖ
const Nav = ({section,setSection}) => (
  <nav>
    <div className="container" style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
      <div style={{display:'flex',alignItems:'center',gap:10,fontWeight:700,fontSize:'1.05rem'}}>
        <span style={{fontSize:'1.3rem'}}>Г°ВҹВ—В„ГҜВёВҸ</span> DB Migration Agent
      </div>
      <div style={{display:'flex',gap:6}}>
        {['home','agents','config','demo','report'].map(s=>(
          <div key={s} className={`tab ${section===s?'active':''}`} onClick={()=>setSection(s)}>
            {s==='home'?'Home':s==='agents'?'Agents':s==='config'?'Config Builder':s==='demo'?'Agent Demo':'Report'}
          </div>
        ))}
      </div>
    </div>
  </nav>
);

const ScoreRing = ({score,size=120,stroke=8}) => {
  const r = (size-stroke)/2, c = 2*Math.PI*r;
  const color = score>=70?'var(--green)':score>=40?'var(--amber)':'var(--red)';
  return (
    <div className="score-ring" style={{width:size,height:size}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c*(1-score/100)} style={{transition:'stroke-dashoffset 1.5s ease'}}/>
      </svg>
      <div className="value" style={{color}}>{score}</div>
    </div>
  );
};

// ГўВ”ВҖГўВ”ВҖ HOME SECTION ГўВ”ВҖГўВ”ВҖ
const HomeSection = ({setSection}) => (
  <div style={{textAlign:'center',paddingTop:100}}>
    <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(6,182,212,.1)',border:'1px solid rgba(6,182,212,.3)',padding:'6px 16px',borderRadius:100,fontSize:'.82rem',color:'var(--cyan)',fontWeight:500,marginBottom:28}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:'var(--cyan)',animation:'pulse 2s ease-in-out infinite',display:'inline-block'}}></span>
      AI-Powered Multi-Agent System
    </div>
    <h1 style={{fontSize:'clamp(2.2rem,5vw,3.8rem)',fontWeight:900,lineHeight:1.1,marginBottom:20,background:'linear-gradient(135deg,#e2e8f0 30%,#06b6d4 70%,#a855f7)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
      Database Migration,<br/>Intelligently Automated
    </h1>
    <p style={{fontSize:'1.15rem',color:'var(--muted)',maxWidth:660,margin:'0 auto 36px'}}>
      End-to-end migration between PostgreSQL, MySQL, SQL Server, Oracle, and Sybase across AWS, Azure, and GCP.
    </p>
    <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
      <button className="btn btn-primary" onClick={()=>setSection('config')}>
        ГўВ–В¶ Start Migration
      </button>
      <button className="btn btn-outline" onClick={()=>setSection('agents')}>
        ГўВ„В№ГҜВёВҸ Explore Agents
      </button>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20,padding:'60px 0 40px',maxWidth:700,margin:'0 auto'}}>
      {[['6','AI Agents'],['5','DB Engines'],['4','Cloud Targets'],['60+','Type Mappings']].map(([n,l])=>(
        <div key={l} style={{textAlign:'center'}}>
          <div style={{fontSize:'2rem',fontWeight:900,background:'var(--grad)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{n}</div>
          <div style={{color:'var(--dim)',fontSize:'.85rem',marginTop:4}}>{l}</div>
        </div>
      ))}
    </div>

    <div className="terminal" style={{maxWidth:680,margin:'0 auto',textAlign:'left'}}>
      <div className="terminal-bar">
        <span className="terminal-dot" style={{background:'#ff5f56'}}></span>
        <span className="terminal-dot" style={{background:'#ffbd2e'}}></span>
        <span className="terminal-dot" style={{background:'#27c93f'}}></span>
      </div>
      <div className="terminal-body" style={{color:'var(--muted)'}}>
        <span style={{color:'var(--dim)'}}># Run an AI-powered migration assessment</span><br/>
        <span style={{color:'var(--green)'}}>$</span> <span style={{color:'var(--text)'}}>dbmigrate migrate</span> <span style={{color:'var(--cyan)'}}>--config</span> oracle_to_aurora.yaml<br/><br/>
        <span style={{color:'var(--purple)'}}>ГўВңВ” Assessment Agent</span> &nbsp;Readiness: 87/100<br/>
        <span style={{color:'var(--purple)'}}>ГўВңВ” Schema Agent</span> &nbsp;&nbsp;&nbsp;&nbsp;32 tables mapped (topological order)<br/>
        <span style={{color:'var(--purple)'}}>ГўВңВ” Data Agent</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;4.2M rows @ 52K rows/sec<br/>
        <span style={{color:'var(--purple)'}}>ГўВңВ” Validation Agent</span> &nbsp;Checksums verified, 0 mismatches<br/><br/>
        <span style={{color:'var(--dim)'}}># Migration completed in 6m 34s</span>
      </div>
    </div>
  </div>
);

// ГўВ”ВҖГўВ”ВҖ AGENTS EXPLORER ГўВ”ВҖГўВ”ВҖ
const AgentsSection = () => {
  const [sel,setSel] = useState('orchestrator');
  const agent = AGENTS.find(a=>a.id===sel);
  return (
    <div style={{paddingTop:80}} className="fade-in">
      <h2 style={{fontSize:'2rem',fontWeight:800,marginBottom:8}}>Agent Architecture Explorer</h2>
      <p style={{color:'var(--muted)',marginBottom:32}}>Click any agent to explore its role, state machine, and decision logic.</p>
      <div className="grid-2">
        <div>
          {AGENTS.map((a,i)=>(
            <React.Fragment key={a.id}>
              <div onClick={()=>setSel(a.id)} className="card" style={{cursor:'pointer',marginBottom:8,borderColor:sel===a.id?a.color:'var(--border)',background:sel===a.id?'var(--bg3)':'var(--bg2)',display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:'1.3rem'}}>{a.icon}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:'.92rem'}}>{a.name}</div>
                  <div style={{color:'var(--dim)',fontSize:'.78rem'}}>{a.role.split(',')[0]}</div>
                </div>
              </div>
              {i<AGENTS.length-1 && <div style={{width:2,height:12,background:'var(--border)',marginLeft:23}}></div>}
            </React.Fragment>
          ))}
        </div>
        <div className="card" style={{borderColor:agent.color}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
            <span style={{fontSize:'1.8rem'}}>{agent.icon}</span>
            <div>
              <h3 style={{fontSize:'1.2rem',fontWeight:800}}>{agent.name}</h3>
              <div style={{color:'var(--muted)',fontSize:'.85rem'}}>{agent.role}</div>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <label>State Machine</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {agent.states.map((s,i)=>(
                <React.Fragment key={s}>
                  <span style={{background:'var(--bg)',border:'1px solid var(--border)',padding:'4px 10px',borderRadius:6,fontSize:'.78rem',fontFamily:'JetBrains Mono'}}>{s}</span>
                  {i<agent.states.length-1 && <span style={{color:'var(--dim)',fontSize:'.8rem'}}>ГўВҶВ’</span>}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div>
            <label>Decision Points</label>
            {agent.decisions.map(d=>(
              <div key={d} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',color:'var(--muted)',fontSize:'.88rem'}}>
                <span style={{color:'var(--green)'}}>ГўВңВ”</span> {d}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ГўВ”ВҖГўВ”ВҖ CONFIG BUILDER ГўВ”ВҖГўВ”ВҖ
const ConfigSection = ({config,setConfig,onExplore}) => {
  const update = (k,v) => setConfig(p=>({...p,[k]:v}));
  return (
    <div style={{paddingTop:80}} className="fade-in">
      <h2 style={{fontSize:'2rem',fontWeight:800,marginBottom:8}}>Migration Config Builder</h2>
      <p style={{color:'var(--muted)',marginBottom:32}}>Configure your migration and click Explore to simulate the AI agents.</p>
      <div className="grid-2">
        <div className="card">
          <h3 style={{fontSize:'1.1rem',fontWeight:700,marginBottom:16}}>Г°ВҹВ”В№ Source Database</h3>
          <label>Database Type</label>
          <select value={config.sourceDb} onChange={e=>update('sourceDb',e.target.value)} style={{marginBottom:12}}>
            <option value="">Select source...</option>
            {DB_TYPES.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
          </select>
          <label>Host</label>
          <input value={config.sourceHost} onChange={e=>update('sourceHost',e.target.value)} placeholder="e.g. db.company.com" style={{marginBottom:12}}/>
          <div className="grid-2">
            <div><label>Port</label><input value={config.sourcePort} onChange={e=>update('sourcePort',e.target.value)} placeholder="5432"/></div>
            <div><label>Database</label><input value={config.sourceDatabase} onChange={e=>update('sourceDatabase',e.target.value)} placeholder="production_db"/></div>
          </div>
          <div className="grid-2" style={{marginTop:12}}>
            <div><label>Username</label><input value={config.sourceUser} onChange={e=>update('sourceUser',e.target.value)} placeholder="admin"/></div>
            <div><label>Password</label><input type="password" value={config.sourcePass} onChange={e=>update('sourcePass',e.target.value)} placeholder="ГўВҖВўГўВҖВўГўВҖВўГўВҖВўГўВҖВўГўВҖВўГўВҖВўГўВҖВў"/></div>
          </div>
        </div>
        <div className="card">
          <h3 style={{fontSize:'1.1rem',fontWeight:700,marginBottom:16}}>Г°ВҹВ”Вё Target</h3>
          <label>Cloud / Target</label>
          <select value={config.targetCloud} onChange={e=>update('targetCloud',e.target.value)} style={{marginBottom:12}}>
            <option value="">Select target...</option>
            {CLOUD_TARGETS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
          </select>
          <label>Target Database Type</label>
          <select value={config.targetDb} onChange={e=>update('targetDb',e.target.value)} style={{marginBottom:12}}>
            <option value="">Select target DB...</option>
            {DB_TYPES.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
          </select>
          <label>Target Host</label>
          <input value={config.targetHost} onChange={e=>update('targetHost',e.target.value)} placeholder="e.g. mydb.rds.amazonaws.com" style={{marginBottom:12}}/>
          <div className="grid-2">
            <div><label>Port</label><input value={config.targetPort} onChange={e=>update('targetPort',e.target.value)} placeholder="5432"/></div>
            <div><label>Database</label><input value={config.targetDatabase} onChange={e=>update('targetDatabase',e.target.value)} placeholder="migration_target"/></div>
          </div>
        </div>
      </div>
      <div className="card" style={{marginTop:20}}>
        <h3 style={{fontSize:'1.1rem',fontWeight:700,marginBottom:16}}>ГўВҡВҷГҜВёВҸ Migration Options</h3>
        <div className="grid-3">
          <div>
            <label>Batch Size</label>
            <select value={config.batchSize} onChange={e=>update('batchSize',e.target.value)}>
              {['1000','5000','10000','50000'].map(v=><option key={v} value={v}>{Number(v).toLocaleString()} rows</option>)}
            </select>
          </div>
          <div>
            <label>Validation Method</label>
            <select value={config.validation} onChange={e=>update('validation',e.target.value)}>
              {['row_count','checksum','sample_rows','all'].map(v=><option key={v} value={v}>{v.replace(/_/g,' ')}</option>)}
            </select>
          </div>
          <div>
            <label>Parallelism</label>
            <select value={config.parallelism} onChange={e=>update('parallelism',e.target.value)}>
              {['1','2','4','8'].map(v=><option key={v} value={v}>{v} threads</option>)}
            </select>
          </div>
        </div>
      </div>
      <div style={{display:'flex',gap:12,marginTop:24,justifyContent:'center'}}>
        <button className="btn btn-primary" disabled={!config.sourceDb||!config.targetDb} onClick={onExplore}>
          Г°ВҹВҡВҖ Explore &amp; Run AI Agents
        </button>
        <button className="btn btn-outline" onClick={()=>{
          const y = `# DB Migration Agent Config\nsource:\n  type: ${config.sourceDb||'postgresql'}\n  host: ${config.sourceHost||'localhost'}\n  port: ${config.sourcePort||'5432'}\n  database: ${config.sourceDatabase||'mydb'}\n  username: ${config.sourceUser||'admin'}\n\ntarget:\n  cloud: ${config.targetCloud||'aws'}\n  type: ${config.targetDb||'postgresql'}\n  host: ${config.targetHost||'target.rds.amazonaws.com'}\n  port: ${config.targetPort||'5432'}\n  database: ${config.targetDatabase||'target_db'}\n\noptions:\n  batch_size: ${config.batchSize}\n  validation: ${config.validation}\n  parallelism: ${config.parallelism}\n`;
          const blob = new Blob([y],{type:'text/yaml'});
          const a = document.createElement('a');
          a.href=URL.createObjectURL(blob);
          a.download='migration_config.yaml';
          a.click();
        }}>
          Г°ВҹВ“ВҘ Download YAML
        </button>
      </div>
    </div>
  );
};

// ГўВ”ВҖГўВ”ВҖ AGENT DEMO ГўВ”ВҖГўВ”ВҖ
const DemoSection = ({config}) => {
  const [phase,setPhase] = useState(0); // 0=idle,1=exploring,2+=agents running
  const [logs,setLogs] = useState([]);
  const [tables,setTables] = useState([]);
  const [agentStates,setAgentStates] = useState({});
  const [score,setScore] = useState(0);
  const [risks,setRisks] = useState([]);
  const [stats,setStats] = useState({});
  const logRef = useRef(null);

  const addLog = useCallback((msg,color='var(--muted)') => {
    setLogs(p=>[...p,{msg,color,ts:new Date().toLocaleTimeString()}]);
  },[]);

  const sleep = ms => new Promise(r=>setTimeout(r,ms));

  const runDemo = async () => {
    setPhase(1); setLogs([]); setTables([]); setAgentStates({}); setScore(0); setRisks([]); setStats({});
    const src = DB_TYPES.find(d=>d.id===config.sourceDb)?.name||'Database';
    const tgt = DB_TYPES.find(d=>d.id===config.targetDb)?.name||'Database';

    // Phase 1: Exploring
    addLog(`Connecting to ${src} at ${config.sourceHost||'localhost'}...`,'var(--cyan)');
    await sleep(800);
    addLog('ГўВңВ” Connection established','var(--green)');
    await sleep(400);
    addLog('Discovering schema...','var(--cyan)');
    await sleep(1200);
    const discovered = SAMPLE_TABLES.slice(0,6+Math.floor(Math.random()*4));
    setTables(discovered);
    addLog(`ГўВңВ” Found ${discovered.length} tables, ${discovered.reduce((s,t)=>s+t.rows,0).toLocaleString()} total rows`,'var(--green)');
    await sleep(600);

    // Phase 2: Assessment Agent
    setPhase(2);
    setAgentStates(p=>({...p,assessment:'running'}));
    addLog('\nГ°ВҹВ”ВҚ Assessment Agent starting...','var(--purple)');
    await sleep(500);
    addLog('  Analyzing schema complexity...','var(--muted)');
    await sleep(800);
    addLog('  Checking cross-DB type compatibility...','var(--muted)');
    await sleep(700);
    addLog('  Calculating data volume metrics...','var(--muted)');
    await sleep(600);

    const riskScore = 65 + Math.floor(Math.random()*25);
    setScore(riskScore);
    const demoRisks = [
      riskScore<80 && {level:'medium',msg:`Large table detected: order_items (5.4M rows) may need batching optimization`},
      config.sourceDb!==config.targetDb && {level:'high',msg:`Cross-DB migration (${src} ГўВҶВ’ ${tgt}): ${3+Math.floor(Math.random()*5)} type mappings require attention`},
      {level:'low',msg:'All foreign key dependencies can be resolved in topological order'},
      riskScore<75 && {level:'medium',msg:'audit_log table (12.4M rows, 1.2 GB) will take the longest to migrate'},
    ].filter(Boolean);
    setRisks(riskScore < 80 ? demoRisks : demoRisks.filter(r=>r.level!=='high'));
    addLog(`  ГўВңВ” Readiness Score: ${riskScore}/100`,'var(--green)');
    setAgentStates(p=>({...p,assessment:'done'}));
    await sleep(400);

    // Phase 3: Schema Agent
    setAgentStates(p=>({...p,schema:'running'}));
    addLog('\nГ°ВҹВ“ВӢ Schema Agent starting...','var(--purple)');
    await sleep(400);
    addLog(`  Generating DDL for ${tgt}...`,'var(--muted)');
    await sleep(900);
    addLog(`  Mapping ${12+Math.floor(Math.random()*8)} column types...`,'var(--muted)');
    await sleep(700);
    addLog(`  Creating ${discovered.length} tables in topological order...`,'var(--muted)');
    await sleep(800);
    addLog(`  ГўВңВ” Schema created successfully`,'var(--green)');
    setAgentStates(p=>({...p,schema:'done'}));
    await sleep(400);

    // Phase 4: Data Agent
    setAgentStates(p=>({...p,data:'running'}));
    addLog('\nГўВҡВЎ Data Agent starting...','var(--purple)');
    const totalRows = discovered.reduce((s,t)=>s+t.rows,0);
    let migrated = 0;
    for (const t of discovered) {
      await sleep(300 + Math.random()*400);
      migrated += t.rows;
      const pct = Math.round(migrated/totalRows*100);
      const speed = (20000+Math.floor(Math.random()*40000)).toLocaleString();
      addLog(`  ГўВңВ” ${t.name}: ${t.rows.toLocaleString()} rows @ ${speed} rows/sec (${pct}%)`,'var(--cyan)');
    }
    setStats({totalRows,tables:discovered.length,speed:'48K',duration:`${2+Math.floor(Math.random()*6)}m ${Math.floor(Math.random()*59)}s`});
    addLog(`  ГўВңВ” All data migrated: ${totalRows.toLocaleString()} rows`,'var(--green)');
    setAgentStates(p=>({...p,data:'done'}));
    await sleep(400);

    // Phase 5: Validation Agent
    setAgentStates(p=>({...p,validation:'running'}));
    addLog('\nГ°ВҹВӣВЎ Validation Agent starting...','var(--purple)');
    await sleep(500);
    addLog('  Verifying row counts...','var(--muted)');
    await sleep(600);
    addLog(`  ГўВңВ” Row counts match: ${totalRows.toLocaleString()} / ${totalRows.toLocaleString()}`,'var(--green)');
    await sleep(400);
    addLog('  Computing checksums (MD5)...','var(--muted)');
    await sleep(800);
    addLog('  ГўВңВ” All checksums verified, 0 mismatches','var(--green)');
    await sleep(400);
    addLog('  Sampling random rows for deep comparison...','var(--muted)');
    await sleep(600);
    addLog('  ГўВңВ” 500 sample rows validated, 100% match','var(--green)');
    setAgentStates(p=>({...p,validation:'done'}));
    await sleep(300);

    addLog(`\nГ°ВҹВҺВү Migration completed successfully!`,'var(--green)');
    setPhase(99);
  };

  useEffect(()=>{
    if(logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  },[logs]);

  const agentOrder = ['assessment','schema','data','validation'];

  return (
    <div style={{paddingTop:80}} className="fade-in">
      <h2 style={{fontSize:'2rem',fontWeight:800,marginBottom:8}}>Live Agent Demo</h2>
      <p style={{color:'var(--muted)',marginBottom:24}}>Watch the AI agents assess, migrate, and validate your configuration in real time.</p>

      {phase===0 && (
        <div style={{textAlign:'center',padding:'60px 0'}}>
          <button className="btn btn-primary" style={{fontSize:'1.1rem',padding:'14px 32px'}} onClick={runDemo} disabled={!config.sourceDb}>
            Г°ВҹВҡВҖ Launch Agent Pipeline
          </button>
          {!config.sourceDb && <p style={{color:'var(--dim)',marginTop:12,fontSize:'.85rem'}}>Configure your migration first in the Config Builder tab.</p>}
        </div>
      )}

      {phase>=1 && (
        <div className="grid-2">
          <div>
            <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
              {agentOrder.map(id=>{
                const a = AGENTS.find(x=>x.id===id);
                const st = agentStates[id];
                return (
                  <div key={id} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:8,background:'var(--bg2)',border:'1px solid var(--border)',fontSize:'.8rem',fontWeight:600}}>
                    {st==='running'?<span className="spinner"></span>:st==='done'?<span style={{color:'var(--green)'}}>ГўВңВ”</span>:<span style={{color:'var(--dim)'}}>ГўВ—ВӢ</span>}
                    {a.name.replace(' Agent','')}
                  </div>
                );
              })}
            </div>

            <div className="terminal">
              <div className="terminal-bar">
                <span className="terminal-dot" style={{background:'#ff5f56'}}></span>
                <span className="terminal-dot" style={{background:'#ffbd2e'}}></span>
                <span className="terminal-dot" style={{background:'#27c93f'}}></span>
                <span style={{marginLeft:'auto',color:'var(--dim)',fontSize:'.75rem'}}>Agent Pipeline</span>
              </div>
              <div className="terminal-body" ref={logRef}>
                {logs.map((l,i)=>(
                  <div key={i}><span style={{color:'var(--dim)',fontSize:'.7rem',marginRight:8}}>{l.ts}</span><span style={{color:l.color}}>{l.msg}</span></div>
                ))}
                {phase>0 && phase<99 && <span className="spinner" style={{marginTop:4}}></span>}
              </div>
            </div>
          </div>

          <div>
            {score>0 && (
              <div className="card" style={{marginBottom:16,textAlign:'center'}}>
                <label style={{marginBottom:12}}>Readiness Score</label>
                <div style={{display:'flex',justifyContent:'center'}}><ScoreRing score={score}/></div>
              </div>
            )}

            {tables.length>0 && (
              <div className="card" style={{marginBottom:16}}>
                <label style={{marginBottom:8}}>Discovered Tables</label>
                <div style={{maxHeight:200,overflow:'auto'}}>
                  {tables.map(t=>(
                    <div key={t.name} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:'.82rem'}}>
                      <code style={{color:'var(--cyan)'}}>{t.name}</code>
                      <span style={{color:'var(--dim)'}}>{t.rows.toLocaleString()} rows ГӮВ· {t.size}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {risks.length>0 && (
              <div className="card">
                <label style={{marginBottom:8}}>Risk Assessment</label>
                {risks.map((r,i)=>(
                  <div key={i} className={`risk-${r.level}`} style={{padding:'8px 12px',borderRadius:8,marginBottom:6,fontSize:'.82rem'}}>
                    {r.level==='high'?'Г°ВҹВ”Вҙ':r.level==='medium'?'Г°ВҹВҹВЎ':'Г°ВҹВҹВў'} {r.msg}
                  </div>
                ))}
              </div>
            )}

            {phase===99 && stats.totalRows && (
              <div className="card" style={{marginTop:16,background:'rgba(34,197,94,.05)',borderColor:'rgba(34,197,94,.3)'}}>
                <label style={{marginBottom:8,color:'var(--green)'}}>Migration Complete ГўВңВ”</label>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:'.88rem'}}>
                  <div><span style={{color:'var(--dim)'}}>Tables:</span> {stats.tables}</div>
                  <div><span style={{color:'var(--dim)'}}>Rows:</span> {stats.totalRows.toLocaleString()}</div>
                  <div><span style={{color:'var(--dim)'}}>Avg Speed:</span> {stats.speed} rows/s</div>
                  <div><span style={{color:'var(--dim)'}}>Duration:</span> {stats.duration}</div>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

// ГўВ”ВҖГўВ”ВҖ REPORT SECTION ГўВ”ВҖГўВ”ВҖ
const ReportSection = ({config,onGenerate}) => {
  const [report,setReport] = useState(null);
  const generate = () => {
    const src = DB_TYPES.find(d=>d.id===config.sourceDb)?.name||'PostgreSQL';
    const tgt = DB_TYPES.find(d=>d.id===config.targetDb)?.name||'PostgreSQL';
    const cld = CLOUD_TARGETS.find(c=>c.id===config.targetCloud)?.name||'AWS';
    const sc = 65+Math.floor(Math.random()*25);
    setReport({
      title:`Migration Assessment: ${src} ГўВҶВ’ ${tgt} (${cld})`,
      date:new Date().toLocaleDateString(),
      score:sc,
      summary:`The migration from ${src} to ${tgt} on ${cld} has been assessed with a readiness score of ${sc}/100. ${sc>=70?'The migration is recommended to proceed with standard precautions.':'Additional review is recommended before proceeding.'}`,
      schema:{tables:SAMPLE_TABLES.length,columns:SAMPLE_TABLES.reduce((s,t)=>s+t.cols,0),fks:SAMPLE_TABLES.reduce((s,t)=>s+t.fks,0),typeMappings:18+Math.floor(Math.random()*12)},
      data:{totalRows:SAMPLE_TABLES.reduce((s,t)=>s+t.rows,0),totalSize:'2.3 GB',largestTable:'audit_log (12.4M rows)',estimatedTime:`${8+Math.floor(Math.random()*12)} minutes`},
      risks:[
        {level:'high',title:'Cross-DB Type Incompatibility',desc:`${3+Math.floor(Math.random()*4)} column types require manual review (e.g., ${src} ARRAY ГўВҶВ’ ${tgt} JSON)`},
        {level:'medium',title:'Large Table Performance',desc:'audit_log (12.4M rows) should use parallel extraction with 4+ threads'},
        {level:'medium',title:'Sequence/Auto-increment Migration',desc:`${src} sequences need to be mapped to ${tgt} identity columns`},
        {level:'low',title:'Index Recreation',desc:'All indexes can be recreated automatically on the target'},
      ],
      recommendations:[
        'Run assessment against production database before migration window',
        'Enable parallel extraction (4 threads) for tables over 1M rows',
        `Test ${src}-specific types (arrays, enums, custom types) mapping`,
        'Schedule migration during low-traffic window (recommended: 2 AM - 6 AM)',
        'Keep source database read-only during migration for data consistency',
        'Verify application connection strings are updated post-migration',
      ],
    });
  };

  return (
    <div style={{paddingTop:80}} className="fade-in">
      <h2 style={{fontSize:'2rem',fontWeight:800,marginBottom:8}}>AI Assessment Report</h2>
      <p style={{color:'var(--muted)',marginBottom:24}}>Generate a comprehensive migration assessment report.</p>

      {!report ? (
        <div style={{textAlign:'center',padding:'60px 0'}}>
          <button className="btn btn-primary" style={{fontSize:'1.1rem',padding:'14px 32px'}} onClick={generate}>
            Г°ВҹВ“ВҠ Generate Assessment Report
          </button>
        </div>
      ) : (
        <div className="fade-in">
          <div className="card" style={{marginBottom:20,background:'linear-gradient(135deg,rgba(6,182,212,.05),rgba(168,85,247,.05))'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:16}}>
              <div>
                <h3 style={{fontSize:'1.3rem',fontWeight:800}}>{report.title}</h3>
                <div style={{color:'var(--dim)',fontSize:'.85rem'}}>Generated: {report.date}</div>
              </div>
              <ScoreRing score={report.score} size={90} stroke={6}/>
            </div>
            <p style={{color:'var(--muted)',marginTop:12,fontSize:'.92rem'}}>{report.summary}</p>
          </div>

          <div className="grid-2" style={{marginBottom:20}}>
            <div className="card">
              <h4 style={{fontWeight:700,marginBottom:12}}>Г°ВҹВ“ВӢ Schema Analysis</h4>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:'.88rem'}}>
                <div><span style={{color:'var(--dim)'}}>Tables:</span> <strong>{report.schema.tables}</strong></div>
                <div><span style={{color:'var(--dim)'}}>Columns:</span> <strong>{report.schema.columns}</strong></div>
                <div><span style={{color:'var(--dim)'}}>Foreign Keys:</span> <strong>{report.schema.fks}</strong></div>
                <div><span style={{color:'var(--dim)'}}>Type Mappings:</span> <strong>{report.schema.typeMappings}</strong></div>
              </div>
            </div>
            <div className="card">
              <h4 style={{fontWeight:700,marginBottom:12}}>ГўВҡВЎ Data Volume</h4>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:'.88rem'}}>
                <div><span style={{color:'var(--dim)'}}>Total Rows:</span> <strong>{report.data.totalRows.toLocaleString()}</strong></div>
                <div><span style={{color:'var(--dim)'}}>Total Size:</span> <strong>{report.data.totalSize}</strong></div>
                <div><span style={{color:'var(--dim)'}}>Largest:</span> <strong>{report.data.largestTable}</strong></div>
                <div><span style={{color:'var(--dim)'}}>Est. Time:</span> <strong>{report.data.estimatedTime}</strong></div>
              </div>
            </div>
          </div>

          <div className="card" style={{marginBottom:20}}>
            <h4 style={{fontWeight:700,marginBottom:12}}>ГўВҡВ ГҜВёВҸ Risk Assessment</h4>
            {report.risks.map((r,i)=>(
              <div key={i} className={`risk-${r.level}`} style={{padding:'12px 16px',borderRadius:8,marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:'.9rem'}}>{r.level==='high'?'Г°ВҹВ”Вҙ HIGH':r.level==='medium'?'Г°ВҹВҹВЎ MEDIUM':'Г°ВҹВҹВў LOW'}: {r.title}</div>
                <div style={{fontSize:'.85rem',marginTop:4,opacity:.85}}>{r.desc}</div>
              </div>
            ))}
          </div>

          <div className="card">
            <h4 style={{fontWeight:700,marginBottom:12}}>Г°ВҹВ’ВЎ AI Recommendations</h4>
            {report.recommendations.map((r,i)=>(
              <div key={i} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:'.88rem',color:'var(--muted)'}}>
                <span style={{color:'var(--cyan)',fontWeight:700,flexShrink:0}}>{i+1}.</span> {r}
              </div>
            ))}
          </div>

          <div style={{textAlign:'center',marginTop:24}}>
            <button className="btn btn-outline" onClick={()=>setReport(null)}>Г°ВҹВ”В„ Regenerate</button>
          </div>
        </div>
      )}
    </div>
  );
};

// ГўВ”ВҖГўВ”ВҖ MAIN APP ГўВ”ВҖГўВ”ВҖ
const App = () => {
  const [section,setSection] = useState('home');
  const [config,setConfig] = useState({
    sourceDb:'',sourceHost:'',sourcePort:'',sourceDatabase:'',sourceUser:'',sourcePass:'',
    targetCloud:'',targetDb:'',targetHost:'',targetPort:'',targetDatabase:'',
    batchSize:'10000',validation:'all',parallelism:'4',
  });

  const handleExplore = () => setSection('demo');

  return (
    <div>
      <Nav section={section} setSection={setSection}/>
      <div className="container" style={{paddingBottom:80}}>
        {section==='home' && <HomeSection setSection={setSection}/>}
        {section==='agents' && <AgentsSection/>}
        {section==='config' && <ConfigSection config={config} setConfig={setConfig} onExplore={handleExplore}/>}
        {section==='demo' && <DemoSection config={config}/>}
        {section==='report' && <ReportSection config={config}/>}
      </div>
      <footer style={{borderTop:'1px solid var(--border)',padding:'32px 0',textAlign:'center',color:'var(--dim)',fontSize:'.82rem'}}>
        DB Migration Agent ГўВҖВ” AI-Powered Multi-Agent Database Migration
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
